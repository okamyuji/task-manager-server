services:
  # PostgreSQLデータベース
  postgres:
    image: postgres:16-alpine
    container_name: task_manager_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=taskmanager
      - POSTGRES_PASSWORD=taskmanager_dev_password
      - POSTGRES_DB=taskmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - task_manager_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  # GoバックエンドAPIサーバー
  api:
    build:
      context: ./
      dockerfile: Dockerfile.local
    container_name: task_manager_api
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env # .envファイルから環境変数を読み込み
    environment:
      # .envの値を上書きする場合はここに記述
      - PORT=8080
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      # PostgreSQL設定（開発環境）
      - DATABASE_URL=postgresql://taskmanager:taskmanager_dev_password@postgres:5432/taskmanager?sslmode=disable
      # 以下は.envから読み込まれる（デフォルト値も指定）
      - JWT_SECRET=${JWT_SECRET:-default-secret-change-in-production}
      - MAIL_FROM=${MAIL_FROM:-noreply@taskmanager.local}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - DEBUG=${DEBUG:-false}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      # Object Storage設定（開発環境ではローカルストレージ使用）
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_CDN_URL=${S3_CDN_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - task_manager_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/uploads/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MailHog（開発用メールサーバー）
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: task_manager_mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # WebUI
    networks:
      - task_manager_network
    restart: unless-stopped
    environment:
      - MH_STORAGE=memory

networks:
  task_manager_network:
    driver: bridge

volumes:
  postgres_data:
  uploads:
